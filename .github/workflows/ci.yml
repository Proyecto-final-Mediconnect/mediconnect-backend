name: CI

# Calidad del código, alineado a la matriz 3.5.4 del Sprint 0.
# La suite de INTEGRACIÓN vive en integration-tests.yml (ENG-39), que corre en
# PR/merge a release/** y main. La protección de rama exige ambos checks en verde
# antes de mergear, así que juntos forman el "pipeline completo" del doc.
#
#   push feature/** · bugfix/**   -> lint + type-check + unit
#   PR/merge a release/** · main  -> lint + type-check + unit + build
on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'release/**'
      - 'main'
  pull_request:
    branches:
      - 'release/**'
      - 'main'

jobs:
  quality:
    name: Lint · Type-check · Unit
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts exige DATABASE_URL para cargar; `prisma generate` no
      # conecta, así que un valor dummy alcanza para generar el cliente en CI.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm run lint:ci

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build (producción)
        # El doc pone el "build de producción" a partir del PR a release, no en
        # el push a feature/bugfix.
        if: github.event_name == 'pull_request' || startsWith(github.ref_name, 'release/') || github.ref_name == 'main'
        run: pnpm run build
