name: Integration Tests

on:
  # ENG-38 extendió estos triggers para sumar `main`: la matriz 3.5.4 del Sprint 0
  # pide la suite de integración también en el PR a main y en el merge a main.
  pull_request:
    branches:
      - 'release/**'
      - 'main'
  push:
    branches:
      - 'release/**'
      - 'main'

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mediconnect
          POSTGRES_PASSWORD: mediconnect
          POSTGRES_DB: mediconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediconnect -d mediconnect_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SKIP_DOCKER: 'true'
      DATABASE_URL: 'postgresql://mediconnect:mediconnect@localhost:5432/mediconnect_test?schema=public'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm run test:integration
